# SPARROW Jr. — Netlify Configuration
# A children's faith companion by Inscribe4u

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Security headers — especially important for an app serving children
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Always serve fresh HTML — never cache the main app file
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    # Icons can be cached safely — they rarely change
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/manifest+json"

# Redirect any path back to the app (single page app behavior)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
